<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AntikGap – Antiquitäten aus Garmisch-Partenkirchen</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Georgia, serif;
background:#f5f1e8;
margin:0;
color:#333;
}

header{
background:#2f2f2f;
color:white;
padding:30px;
text-align:center;
}

header h1{
margin:0;
font-size:32px;
letter-spacing:2px;
}

header p{
margin-top:8px;
opacity:0.8;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin:0 0 10px 0;
font-size:18px;
}

.button{
display:inline-block;
padding:10px 16px;
background:#8b6f47;
color:white;
text-decoration:none;
border-radius:4px;
margin-top:10px;
}

footer{
text-align:center;
padding:30px;
background:#2f2f2f;
color:white;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>AntikGap</h1>
<p>Antiquitäten aus Garmisch-Partenkirchen</p>
</header>

<div class="container">

<h2>Aktuelle Stücke</h2>

<div class="grid">

<div class="card">
<img src="https://picsum.photos/400/300?random=1">
<div class="card-content">
<h3>Antikes Sammlerstück</h3>
<a class="button" href="https://www.ebay.de" target="_blank">Bei eBay ansehen</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?random=2">
<div class="card-content">
<h3>Historisches Objekt</h3>
<a class="button" href="https://www.ebay.de" target="_blank">Bei eBay ansehen</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?random=3">
<div class="card-content">
<h3>Seltenes Sammlerstück</h3>
<a class="button" href="https://www.ebay.de" target="_blank">Bei eBay ansehen</a>
</div>
</div>

</div>

</div>

<footer>
AntikGap · Garmisch-Partenkirchen · Antiquitäten & Sammlerstücke
</footer>

</body>
</html>
