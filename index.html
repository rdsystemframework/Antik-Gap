<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AntikGap</title>

<style>

body{
font-family:Arial;
background:#e8e3d9;
margin:0;
}

header{
background:#2f2f2f;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

.button{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#2f2f2f;
color:white;
text-decoration:none;
border-radius:5px;
}

footer{
background:#2f2f2f;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>AntikGap</h1>
<p>Antiquitäten & Sammlerstücke aus Garmisch-Partenkirchen</p>
</header>

<div class="container">

<h2>Ausgewählte Stücke</h2>

<div class="grid">

<div class="card">
<img src="https://i.ebayimg.com/images/g/0NAAAOSwqW9lXc9Q/s-l1600.jpg">
<h3>Antikes Sammlerstück</h3>
<a class="button" href="https://ebay.us/m/9VSnUz" target="_blank">Artikel ansehen</a>
</div>

<div class="card">
<img src="https://i.ebayimg.com/images/g/WsAAAOSwqHplXc~Z/s-l1600.jpg">
<h3>Vintage Objekt</h3>
<a class="button" href="https://ebay.us/m/9VSnUz" target="_blank">Artikel ansehen</a>
</div>

<div class="card">
<img src="https://i.ebayimg.com/images/g/bEAAAOSwHkVlXc9f/s-l1600.jpg">
<h3>Sammlerfigur</h3>
<a class="button" href="https://ebay.us/m/9VSnUz" target="_blank">Artikel ansehen</a>
</div>

</div>

</div>

<footer>
AntikGap • Antiquitätenhandel • Garmisch-Partenkirchen
</footer>

</body>
</html>
