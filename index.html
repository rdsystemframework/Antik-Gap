<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AntikGap – Antiquitäten aus Garmisch-Partenkirchen</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Georgia, serif;
background:#f4f1e8;
margin:0;
color:#333;
}

header{
background:#2f2f2f;
color:white;
padding:40px;
text-align:center;
}

header h1{
margin:0;
font-size:36px;
letter-spacing:2px;
}

header p{
margin-top:10px;
opacity:0.8;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin:0 0 10px 0;
font-size:18px;
}

.button{
display:inline-block;
padding:10px 16px;
background:#8b6f47;
color:white;
text-decoration:none;
border-radius:4px;
margin-top:10px;
}

footer{
text-align:center;
padding:30px;
background:#2f2f2f;
color:white;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>AntikGap</h1>
<p>Antiquitäten & Sammlerstücke aus Garmisch-Partenkirchen</p>
</header>

<div class="container">

<h2>Aktuelle Angebote</h2>

<div id="items" class="grid"></div>

</div>

<footer>
AntikGap · Antiquitätenhandel · Garmisch-Partenkirchen
