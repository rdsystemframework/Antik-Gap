<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AntikGap</title>

<style>
body{
font-family:Arial;
background:#e8e3d9;
margin:0;
}

header{
background:#2f2f2f;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

.button{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#2f2f2f;
color:white;
text-decoration:none;
border-radius:5px;
}

footer{
background:#2f2f2f;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>AntikGap</h1>
<p>Antiquitäten & Sammlerstücke aus Garmisch-Partenkirchen</p>
</header>

<div class="container">

<h2>Aktuelle Angebote</h2>

<div class="grid" id="items"></div>

</div>

<footer>
AntikGap • Antiquitätenhandel • Garmisch-Partenkirchen
</footer>

<script>

fetch("https://api.allorigins.win/raw?url=https://www.ebay.de/sch/i.html?_ssn=antikgap&_rss=1")
.then(res => res.text())
.then(str => new window.DOMParser().parseFromString(str,"text/xml"))
.then(data => {

const items = data.querySelectorAll("item");
const container = document.getElementById("items");

items.forEach(el => {

const title = el.querySelector("title").textContent;
const link = el.querySelector("link").textContent;

const description = el.querySelector("description").textContent;
const imgMatch = description.match(/src="(.*?)"/);
const img = imgMatch ? imgMatch[1] : "";

const card = `
<div class="card">
<img src="${img}">
<h3>${title}</h3>
<a class="button" href="${link}" target="_blank">Bei eBay ansehen</a>
</div>
`;

container.innerHTML += card;

});

});

</script>

</body>
</html>
